<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ==================== STORAGE (localStorage for PWA) ====================
const storage = {
  get: (key) => { try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch { return null; } },
  set: (key, value) => { try { localStorage.setItem(key, value); return true; } catch { return false; } },
};

// ==================== UTILS ====================
function getWeekPeriods(baseYear, baseMonth) {
  const periods = [];
  let cursor = new Date(baseYear, baseMonth, 25);
  const nextMonth = baseMonth === 11 ? 0 : baseMonth + 1;
  const nextYear  = baseMonth === 11 ? baseYear + 1 : baseYear;
  const endDate   = new Date(nextYear, nextMonth, 24);
  for (let w = 0; w < 5; w++) {
    const start = new Date(cursor);
    let end = new Date(cursor);
    end.setDate(end.getDate() + 6);
    if (end > endDate) end = new Date(endDate);
    periods.push({ start, end });
    cursor.setDate(cursor.getDate() + 7);
    if (cursor > endDate) break;
  }
  return periods;
}
function formatDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function getDatesInRange(start, end) {
  const dates = []; let cur = new Date(start);
  while (cur <= end) { dates.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return dates;
}
function getCycleLabel(year, month) {
  const nm = month===11?0:month+1; const ny = month===11?year+1:year;
  return `${year}年${month+1}月25日〜${ny}年${nm+1}月24日`;
}

// ==================== DEFAULTS ====================
const DEFAULT_FIXED = [
  {id:"fc1", name:"家賃",             category:"住居費", day:25,   amount:80000},
  {id:"fc2", name:"返済",             category:"ローン", day:25,   amount:30000},
  {id:"fc3", name:"携帯",             category:"通信費", day:10,   amount:8000},
  {id:"fc4", name:"定期代",           category:"交通費", day:10,   amount:12000},
  {id:"fc5", name:"クレカ決済（固定）", category:"その他", day:10,  amount:0, hasBreakdown:true},
  {id:"fc5b",name:"クレカ決済（臨時）", category:"その他", day:10,  amount:0, hasBreakdown:true},
  {id:"fc6", name:"ヘアカット",       category:"美容費", day:null, amount:4000},
  {id:"fc7", name:"眉毛サロン",       category:"美容費", day:null, amount:3000},
  {id:"fc8", name:"脱毛",             category:"美容費", day:null, amount:5000},
  {id:"fc9", name:"保険",             category:"保険",   day:null, amount:15000},
  {id:"fc10",name:"体メンテ",         category:"健康費", day:null, amount:8000},
];
const CAT_COLORS = {"住居費":"#e74c3c","ローン":"#c0392b","通信費":"#3498db","交通費":"#2980b9","美容費":"#e91e63","保険":"#9b59b6","健康費":"#27ae60","食費":"#f39c12","娯楽費":"#1abc9c","その他":"#95a5a6"};
const ALL_CATS     = Object.keys(CAT_COLORS);
const EXPENSE_CATS = ["食費","外食費","交通費","日用品","娯楽費","医療費","衣服費","その他"];

// ==================== COMPONENTS ====================
function Modal({open, onClose, title, children}) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#1a1a2e",border:"1px solid #2d2d4e",borderRadius:"16px",padding:"24px",maxWidth:"500px",width:"100%",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
          <h3 style={{margin:0,color:"#e0e0ff",fontSize:"17px"}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#888",fontSize:"22px",cursor:"pointer",lineHeight:1,padding:"4px 8px"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({label, value, onChange, type="text", placeholder}) {
  return (
    <div style={{marginBottom:"14px"}}>
      <label style={{display:"block",color:"#a0a0c0",fontSize:"12px",marginBottom:"6px"}}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:"100%",background:"#0d0d1a",border:"1px solid #2d2d4e",borderRadius:"8px",padding:"12px",color:"#e0e0ff",fontSize:"16px",outline:"none"}}/>
    </div>
  );
}

function SelField({label, value, onChange, options}) {
  return (
    <div style={{marginBottom:"14px"}}>
      <label style={{display:"block",color:"#a0a0c0",fontSize:"12px",marginBottom:"6px"}}>{label}</label>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:"100%",background:"#0d0d1a",border:"1px solid #2d2d4e",borderRadius:"8px",padding:"12px",color:"#e0e0ff",fontSize:"16px"}}>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

// ==================== MAIN APP ====================
function KakeiboApp() {
  const today = new Date();
  const initY = today.getDate()>=25?today.getFullYear():(today.getMonth()===0?today.getFullYear()-1:today.getFullYear());
  const initM = today.getDate()>=25?today.getMonth():(today.getMonth()===0?11:today.getMonth()-1);

  const [cy, setCy] = useState(initY);
  const [cm, setCm] = useState(initM);
  const cycleKey = `kc_${cy}_${cm}`;
  const dailyKey = `kd_${cy}_${cm}`;

  const [dailyData,  setDailyData]  = useState({});
  const [fixedCosts, setFixedCosts] = useState(DEFAULT_FIXED);
  const [cycleStore, setCycleStore] = useState({});
  const [memos,      setMemos]      = useState([]);
  const [activeTab,  setActiveTab]  = useState("weekly");

  const [modalAddExp,    setModalAddExp]    = useState(false);
  const [modalAddFixed,  setModalAddFixed]  = useState(false);
  const [modalEditFixed, setModalEditFixed] = useState(null);
  const [modalAddTemp,   setModalAddTemp]   = useState(false);
  const [modalOverride,  setModalOverride]  = useState(null);
  const [modalAddMemo,   setModalAddMemo]   = useState(false);
  const [selectedDate,   setSelectedDate]   = useState(null);
  const [expandedBD,     setExpandedBD]     = useState({});

  const [fExp,  setFExp]  = useState({date:"",amount:"",category:"食費",note:"",isBudget:false});
  const [fFixed,setFFixed]= useState({name:"",category:"その他",day:"",amount:"",hasBreakdown:false});
  const [fEdit, setFEdit] = useState({name:"",category:"その他",day:"",amount:"",hasBreakdown:false});
  const [fTemp, setFTemp] = useState({name:"",category:"その他",day:"",amount:""});
  const [fOver, setFOver] = useState("");
  const [fMemo, setFMemo] = useState({date:"",title:"",amount:"",note:""});
  const [fBD,   setFBD]   = useState({fcId:null,name:"",amount:""});

  // load
  useEffect(()=>{
    try{const r=storage.get(dailyKey); if(r) setDailyData(JSON.parse(r.value)); else setDailyData({});}catch{setDailyData({});}
    try{const r=storage.get("kf");     if(r) setFixedCosts(JSON.parse(r.value));}catch{}
    try{const r=storage.get("kcs");    if(r) setCycleStore(JSON.parse(r.value));}catch{}
    try{const r=storage.get("km");     if(r) setMemos(JSON.parse(r.value));}catch{}
  },[dailyKey]);

  const saveDaily  = (d)=>{ setDailyData(d);  storage.set(dailyKey,JSON.stringify(d)); };
  const saveFixed  = (d)=>{ setFixedCosts(d); storage.set("kf",JSON.stringify(d));    };
  const saveCycle  = (d)=>{ setCycleStore(d); storage.set("kcs",JSON.stringify(d));   };
  const saveMemos  = (d)=>{ setMemos(d);      storage.set("km",JSON.stringify(d));    };

  const thisCycle   = cycleStore[cycleKey] || {overrides:{},tempItems:[],breakdowns:{}};
  const updateCycle = (patch) => saveCycle({...cycleStore,[cycleKey]:{...thisCycle,...patch}});

  const getBDItems = (id) => (thisCycle.breakdowns||{})[id]||[];
  const getBDTotal = (id) => { const its=getBDItems(id); return its.length?its.reduce((s,b)=>s+Number(b.amount),0):null; };
  const addBDItem  = (id,item) => updateCycle({breakdowns:{...(thisCycle.breakdowns||{}),[id]:[...getBDItems(id),item]}});
  const delBDItem  = (id,bid)  => updateCycle({breakdowns:{...(thisCycle.breakdowns||{}),[id]:getBDItems(id).filter(b=>b.id!==bid)}});

  const setOvr   = (id,patch) => updateCycle({overrides:{...thisCycle.overrides,[id]:{...(thisCycle.overrides[id]||{}),...patch}}});
  const clearOvr = (id) => { const o={...thisCycle.overrides}; delete o[id]; updateCycle({overrides:o}); };

  const effectiveFixed = [
    ...fixedCosts.filter(f=>!thisCycle.overrides[f.id]?.hidden).map(f=>{
      const ov=thisCycle.overrides[f.id]?.amount;
      const bdt=f.hasBreakdown?getBDTotal(f.id):null;
      return {...f, amount:bdt!==null?bdt:(ov??f.amount), isOverridden:ov!==undefined};
    }),
    ...(thisCycle.tempItems||[]).map(t=>({...t,isTemp:true})),
  ];
  const fixedTotal = effectiveFixed.reduce((s,f)=>s+Number(f.amount),0);

  const periods       = getWeekPeriods(cy,cm);
  const allCycleDates = periods.flatMap(p=>getDatesInRange(p.start,p.end));
  const getActual = dk=>(dailyData[dk]?.expenses||[]).reduce((s,e)=>s+Number(e.amount),0);
  const getBudget = dk=>dailyData[dk]?.budget||0;
  const cycleTotal  = allCycleDates.reduce((s,d)=>s+getActual(dateKey(d)),0);
  const cycleBudget = allCycleDates.reduce((s,d)=>s+getBudget(dateKey(d)),0);

  const prevCycle=()=>{if(cm===0){setCy(y=>y-1);setCm(11);}else setCm(m=>m-1);};
  const nextCycle=()=>{if(cm===11){setCy(y=>y+1);setCm(0);}else setCm(m=>m+1);};

  const handleAddExp=()=>{
    const dk=fExp.date; if(!dk||!fExp.amount) return;
    const nd={...dailyData}; if(!nd[dk]) nd[dk]={expenses:[],budget:0};
    if(fExp.isBudget) nd[dk].budget=Number(fExp.amount);
    else nd[dk].expenses=[...(nd[dk].expenses||[]),{id:Date.now(),amount:Number(fExp.amount),category:fExp.category,note:fExp.note}];
    saveDaily(nd); setFExp({date:"",amount:"",category:"食費",note:"",isBudget:false}); setModalAddExp(false);
  };
  const handleDelExp=(dk,id)=>{const nd={...dailyData};if(nd[dk])nd[dk].expenses=nd[dk].expenses.filter(e=>e.id!==id);saveDaily(nd);};
  const handleAddFixed=()=>{
    if(!fFixed.name||!fFixed.amount) return;
    saveFixed([...fixedCosts,{id:`fc${Date.now()}`,name:fFixed.name,category:fFixed.category,day:fFixed.day?Number(fFixed.day):null,amount:Number(fFixed.amount),hasBreakdown:fFixed.hasBreakdown}]);
    setFFixed({name:"",category:"その他",day:"",amount:"",hasBreakdown:false}); setModalAddFixed(false);
  };
  const handleDelFixed  = id=>saveFixed(fixedCosts.filter(f=>f.id!==id));
  const handleOpenEdit  = f=>{setFEdit({name:f.name,category:f.category,day:f.day!=null?String(f.day):"",amount:String(f.amount),hasBreakdown:f.hasBreakdown||false});setModalEditFixed(f);};
  const handleUpdateFixed=()=>{
    if(!fEdit.name||!fEdit.amount) return;
    saveFixed(fixedCosts.map(f=>f.id===modalEditFixed.id?{...f,name:fEdit.name,category:fEdit.category,day:fEdit.day?Number(fEdit.day):null,amount:Number(fEdit.amount),hasBreakdown:fEdit.hasBreakdown}:f));
    setModalEditFixed(null);
  };
  const handleAddTemp=()=>{
    if(!fTemp.name||!fTemp.amount) return;
    updateCycle({tempItems:[...(thisCycle.tempItems||[]),{id:`tmp${Date.now()}`,name:fTemp.name,category:fTemp.category,day:fTemp.day?Number(fTemp.day):null,amount:Number(fTemp.amount)}]});
    setFTemp({name:"",category:"その他",day:"",amount:""}); setModalAddTemp(false);
  };
  const handleDelTemp    = id=>updateCycle({tempItems:(thisCycle.tempItems||[]).filter(t=>t.id!==id)});
  const handleSaveOverride=()=>{if(!modalOverride)return;fOver===""?clearOvr(modalOverride.id):setOvr(modalOverride.id,{amount:Number(fOver)});setModalOverride(null);setFOver("");};
  const toggleHidden     = (id,cur)=>cur?clearOvr(id):setOvr(id,{hidden:true});
  const handleAddMemo    = ()=>{if(!fMemo.date||!fMemo.title)return;saveMemos([...memos,{id:Date.now(),...fMemo}]);setFMemo({date:"",title:"",amount:"",note:""});setModalAddMemo(false);};
  const handleDelMemo    = id=>saveMemos(memos.filter(m=>m.id!==id));
  const handleAddBD      = fcId=>{if(!fBD.name||!fBD.amount)return;addBDItem(fcId,{id:`bd${Date.now()}`,name:fBD.name,amount:Number(fBD.amount)});setFBD({fcId:null,name:"",amount:""});};

  const todayKey    = dateKey(today);
  const futureMemos = memos.filter(m=>m.date>=todayKey).sort((a,b)=>a.date.localeCompare(b.date));
  const pastMemos   = memos.filter(m=>m.date< todayKey).sort((a,b)=>b.date.localeCompare(a.date));

  // クレカ集計：名前に「クレカ」を含む内訳あり項目をすべて対象にする
  const ccFixedItems = fixedCosts.filter(f => f.hasBreakdown && f.name.includes("クレカ") && f.name.includes("固定"));
  const ccTempItems  = fixedCosts.filter(f => f.hasBreakdown && f.name.includes("クレカ") && (f.name.includes("臨時") || !f.name.includes("固定")));
  // どちらにも分類されない場合は全クレカ項目をまとめて扱う
  const ccAllItems   = fixedCosts.filter(f => f.hasBreakdown && f.name.includes("クレカ"));
  const useGrouped   = ccFixedItems.length > 0 || ccTempItems.length > 0;

  const ccFBD  = useGrouped ? ccFixedItems.flatMap(f => getBDItems(f.id)) : [];
  const ccTBD  = useGrouped ? ccTempItems.flatMap(f => getBDItems(f.id))  : ccAllItems.flatMap(f => getBDItems(f.id));
  const ccFHid = useGrouped ? ccFixedItems.every(f => thisCycle.overrides[f.id]?.hidden) && ccFixedItems.length > 0 : false;
  const ccTHid = useGrouped
    ? (ccTempItems.length > 0 && ccTempItems.every(f => thisCycle.overrides[f.id]?.hidden))
    : ccAllItems.every(f => thisCycle.overrides[f.id]?.hidden) && ccAllItems.length > 0;
  const ccFSum = ccFBD.reduce((s,b)=>s+Number(b.amount),0);
  const ccTSum = ccTBD.reduce((s,b)=>s+Number(b.amount),0);
  const ccTot  = (!ccFHid ? ccFSum : 0) + (!ccTHid ? ccTSum : 0);

  const fixedDayGroups=[25,10,...([...new Set(fixedCosts.map(f=>f.day))].filter(d=>d!==25&&d!==10).sort((a,b)=>a===null?1:b===null?-1:a-b))];

  const pBtn={background:"linear-gradient(135deg,#3d2d8e,#5d3d9e)",border:"1px solid #6d4dae",color:"#e0d4ff",borderRadius:"10px",padding:"10px 18px",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",gap:"4px",fontWeight:500,WebkitAppearance:"none"};
  const sBtn=(bc,c)=>({background:"none",border:`1px solid ${bc}`,color:c,borderRadius:"6px",padding:"5px 9px",cursor:"pointer",fontSize:"12px",WebkitAppearance:"none"});
  const navB={background:"rgba(255,255,255,0.05)",border:"1px solid #2d2d4e",color:"#a0a0d0",borderRadius:"10px",padding:"8px 16px",cursor:"pointer",fontSize:"20px",lineHeight:1};
  const inSt={background:"#0d0d1a",border:"1px solid rgba(26,188,156,0.3)",borderRadius:"6px",padding:"9px 10px",color:"#e0e0ff",fontSize:"14px",outline:"none"};

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0a1a,#0d0d2b,#0a0a1a)",color:"#e0e0ff",paddingBottom:"env(safe-area-inset-bottom)"}}>

      {/* HEADER */}
      <div style={{background:"rgba(13,13,42,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid #2d2d4e",padding:"14px 16px",position:"sticky",top:0,zIndex:100,paddingTop:"calc(14px + env(safe-area-inset-top))"}}>
        <div style={{maxWidth:"600px",margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <h1 style={{margin:0,fontSize:"20px",fontWeight:700,color:"#c0b4ff"}}>💴 家計簿</h1>
              <div style={{fontSize:"11px",color:"#6060a0",marginTop:"1px"}}>25日起算サイクル管理</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
              <button onClick={prevCycle} style={navB}>‹</button>
              <div style={{fontSize:"13px",color:"#a0a0d0",minWidth:"110px",textAlign:"center"}}>{cy}年{cm+1}月〜</div>
              <button onClick={nextCycle} style={navB}>›</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"12px"}}>
            {[["サイクル支出",cycleTotal,"#e74c3c"],["予算合計",cycleBudget,"#3498db"],["固定費合計",fixedTotal,"#9b59b6"]].map(([l,v,c])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.04)",borderRadius:"10px",padding:"10px 10px",border:"1px solid #2d2d4e"}}>
                <div style={{fontSize:"10px",color:"#6060a0",marginBottom:"3px"}}>{l}</div>
                <div style={{fontSize:"15px",fontFamily:"'Space Mono',monospace",color:c,fontWeight:700}}>¥{v.toLocaleString()}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:"600px",margin:"0 auto",padding:"0 14px"}}>
        {/* TABS */}
        <div style={{display:"flex",gap:"4px",padding:"12px 0",borderBottom:"1px solid #1a1a3a"}}>
          {[["weekly","📊 週次"],["fixed","📌 固定費"],["memo","📝 メモ"]].map(([k,l])=>(
            <button key={k} onClick={()=>setActiveTab(k)} style={{background:activeTab===k?"#2d2d5e":"transparent",border:activeTab===k?"1px solid #4d4d9e":"1px solid transparent",borderRadius:"8px",padding:"9px 14px",color:activeTab===k?"#c0b4ff":"#606080",cursor:"pointer",fontSize:"13px",flex:1,WebkitAppearance:"none"}}>{l}</button>
          ))}
        </div>

        {/* ===== WEEKLY ===== */}
        {activeTab==="weekly" && (
          <div style={{padding:"14px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
              <h2 style={{margin:0,fontSize:"13px",color:"#a0a0d0"}}>{getCycleLabel(cy,cm)}</h2>
              <button onClick={()=>setModalAddExp(true)} style={pBtn}>＋ 支出追加</button>
            </div>
            {cycleBudget>0&&(
              <div style={{marginBottom:"14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",color:"#8080a0",marginBottom:"4px"}}>
                  <span>サイクル予算消化率</span><span>{Math.round(cycleTotal/cycleBudget*100)}%</span>
                </div>
                <div style={{background:"#1a1a3a",borderRadius:"4px",height:"6px",overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:"4px",width:`${Math.min(100,cycleTotal/cycleBudget*100)}%`,background:cycleTotal>cycleBudget?"#e74c3c":"linear-gradient(90deg,#3498db,#9b59b6)",transition:"width .5s"}}/>
                </div>
              </div>
            )}
            {periods.map((period,idx)=>{
              const pDates=getDatesInRange(period.start,period.end);
              const pActual=pDates.reduce((s,d)=>s+getActual(dateKey(d)),0);
              const pBudget=pDates.reduce((s,d)=>s+getBudget(dateKey(d)),0);
              const cumul=periods.slice(0,idx+1).flatMap(p=>getDatesInRange(p.start,p.end)).reduce((s,d)=>s+getActual(dateKey(d)),0);
              const isOver=pBudget>0&&pActual>pBudget;
              return (
                <div key={idx} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${isOver?"#e74c3c40":"#2d2d4e"}`,borderRadius:"12px",marginBottom:"10px",overflow:"hidden"}}>
                  <div style={{background:isOver?"rgba(231,76,60,0.1)":"rgba(255,255,255,0.03)",padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1a1a3a"}}>
                    <span style={{fontSize:"13px",fontWeight:600,color:"#c0b4ff"}}>
                      第{idx+1}週　{formatDate(period.start)}〜{formatDate(period.end)}

        <div style={{display:"flex",gap:"8px"}}>
          <button onClick={()=>setModalEditFixed(null)} style={{flex:1,background:"transparent",border:"1px solid #3d3d5e",color:"#808090",borderRadius:"8px",padding:"12px",cursor:"pointer",fontSize:"14px",WebkitAppearance:"none"}}>キャンセル</button>
          <button onClick={handleUpdateFixed} style={{...pBtn,flex:2,justifyContent:"center"}}>保存する</button>
        </div>
      </Modal>

      <Modal open={modalAddTemp} onClose={()=>setModalAddTemp(false)} title="今月の臨時支出を追加">
        <div style={{background:"rgba(243,156,18,0.08)",border:"1px solid rgba(243,156,18,0.2)",borderRadius:"8px",padding:"10px 12px",marginBottom:"14px",fontSize:"13px",color:"#c09040"}}>このサイクルのみ表示されます</div>
        <Field label="項目名" value={fTemp.name} onChange={v=>setFTemp(f=>({...f,name:v}))} placeholder="例: 旅行積立"/>
        <SelField label="カテゴリ" value={fTemp.category} onChange={v=>setFTemp(f=>({...f,category:v}))} options={ALL_CATS}/>
        <Field label="引落日（任意）" value={fTemp.day} onChange={v=>setFTemp(f=>({...f,day:v}))} type="number" placeholder="例: 15"/>
        <Field label="金額" value={fTemp.amount} onChange={v=>setFTemp(f=>({...f,amount:v}))} type="number" placeholder="0"/>
        <button onClick={handleAddTemp} style={{...pBtn,width:"100%",justifyContent:"center",background:"linear-gradient(135deg,#8e5d00,#b07a10)",border:"1px solid #c09020"}}>追加</button>
      </Modal>

      <Modal open={!!modalOverride} onClose={()=>{setModalOverride(null);setFOver("");}} title={`今月の金額を変更：${modalOverride?.name||""}`}>
        <div style={{background:"rgba(243,156,18,0.06)",border:"1px solid rgba(243,156,18,0.15)",borderRadius:"8px",padding:"10px 12px",marginBottom:"14px",fontSize:"13px",color:"#c09040"}}>このサイクルのみ反映。元の金額 ¥{Number(modalOverride?.amount||0).toLocaleString()}</div>
        <Field label="今月の金額（空欄でリセット）" value={fOver} onChange={setFOver} type="number" placeholder={String(modalOverride?.amount||"")}/>
        <div style={{display:"flex",gap:"8px"}}>
          <button onClick={()=>{setModalOverride(null);setFOver("");}} style={{flex:1,background:"transparent",border:"1px solid #3d3d5e",color:"#808090",borderRadius:"8px",padding:"12px",cursor:"pointer",fontSize:"14px",WebkitAppearance:"none"}}>キャンセル</button>
          <button onClick={handleSaveOverride} style={{...pBtn,flex:2,justifyContent:"center",background:"linear-gradient(135deg,#7a5a00,#a07010)",border:"1px solid #b08020"}}>今月だけ変更</button>
        </div>
      </Modal>

      <Modal open={modalAddMemo} onClose={()=>setModalAddMemo(false)} title="支払予定メモを追加">
        <Field label="予定日" value={fMemo.date} onChange={v=>setFMemo(f=>({...f,date:v}))} type="date"/>
        <Field label="タイトル" value={fMemo.title} onChange={v=>setFMemo(f=>({...f,title:v}))} placeholder="例: 年払い保険"/>
        <Field label="金額（任意）" value={fMemo.amount} onChange={v=>setFMemo(f=>({...f,amount:v}))} type="number" placeholder="0"/>
        <Field label="メモ（任意）" value={fMemo.note} onChange={v=>setFMemo(f=>({...f,note:v}))} placeholder="詳細を入力"/>
        <button onClick={handleAddMemo} style={{...pBtn,width:"100%",justifyContent:"center"}}>追加</button>
      </Modal>
    </div>
  );
}

function MemoCard({memo, onDelete, past}) {
  return (
    <div style={{background:past?"rgba(255,255,255,0.02)":"rgba(192,180,255,0.05)",border:`1px solid ${past?"#1d1d3a":"#3d3d6e"}`,borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",opacity:past?0.6:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"4px"}}>
            <span style={{fontSize:"12px",fontFamily:"'Space Mono',monospace",color:"#8080c0"}}>{memo.date.replace(/-/g,"/")}</span>
            <span style={{fontSize:"14px",color:"#e0e0ff"}}>{memo.title}</span>
          </div>
          {memo.amount&&<div style={{fontSize:"14px",fontFamily:"'Space Mono',monospace",color:"#c0b4ff"}}>¥{Number(memo.amount).toLocaleString()}</div>}
          {memo.note&&<div style={{fontSize:"12px",color:"#6060a0",marginTop:"4px"}}>{memo.note}</div>}
        </div>
        <button onClick={()=>onDelete(memo.id)} style={{background:"none",border:"1px solid #3d3d5e",color:"#606080",borderRadius:"6px",padding:"6px 10px",cursor:"pointer",fontSize:"13px",flexShrink:0,WebkitAppearance:"none"}}>削除</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<KakeiboApp/>);
</script>

      console.log('SW registered');
    }).catch(e => console.log('SW failed:', e));
  });
